<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>知心伙伴 - 智能对话</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #6c5ce7;
            --primary-light: #a29bfe;
            --bg: #f8f9fa;
            --bg-chat: #ffffff;
            --text: #2d3436;
            --text-soft: #636e72;
            --border: #dfe6e9;
            --user-bg: #6c5ce7;
            --user-text: #ffffff;
            --assistant-bg: #f8f9fa;
            --assistant-text: #2d3436;
            --header-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --dot-gradient-from: rgba(108, 92, 231, 0.15);
            --dot-gradient-to: rgba(255, 255, 255, 0.1);
            --dot-glow: #6c5ce7;
            --font-size-base: 15px;
            --msg-bubble-radius: 18px;
        }
        
        /* 主题配置 */
        [data-theme="dark"] {
            --bg: #1a1a2e;
            --bg-chat: #16213e;
            --text: #eaeaea;
            --text-soft: #a0a0a0;
            --border: #2c3e50;
            --assistant-bg: #1a1a2e;
            --assistant-text: #eaeaea;
            --dot-gradient-from: rgba(102, 126, 234, 0.25);
            --dot-gradient-to: rgba(118, 75, 162, 0.15);
        }
        
        [data-theme="ocean"] {
            --primary: #0984e3;
            --primary-light: #74b9ff;
            --bg: #dfe6e9;
            --bg-chat: #ffffff;
            --text: #2d3436;
            --text-soft: #636e72;
            --border: #b2bec3;
            --user-bg: #0984e3;
            --user-text: #ffffff;
            --assistant-bg: #f1f2f6;
            --assistant-text: #2d3436;
            --header-gradient: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%);
            --dot-gradient-from: rgba(9, 132, 227, 0.2);
            --dot-gradient-to: rgba(116, 185, 255, 0.1);
            --dot-glow: #0984e3;
        }
        
        [data-theme="forest"] {
            --primary: #00b894;
            --primary-light: #55efc4;
            --bg: #e8f5e9;
            --bg-chat: #ffffff;
            --text: #2d3436;
            --text-soft: #636e72;
            --border: #c8e6c9;
            --user-bg: #00b894;
            --user-text: #ffffff;
            --assistant-bg: #f1f8e9;
            --assistant-text: #2d3436;
            --header-gradient: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            --dot-gradient-from: rgba(0, 184, 148, 0.2);
            --dot-gradient-to: rgba(85, 239, 196, 0.1);
            --dot-glow: #00b894;
        }
        
        [data-theme="sunset"] {
            --primary: #e17055;
            --primary-light: #fab1a0;
            --bg: #ffeaa7;
            --bg-chat: #fff5e6;
            --text: #2d3436;
            --text-soft: #636e72;
            --border: #fdcb6e;
            --user-bg: #e17055;
            --user-text: #ffffff;
            --assistant-bg: #fff9e6;
            --assistant-text: #2d3436;
            --header-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --dot-gradient-from: rgba(225, 112, 85, 0.2);
            --dot-gradient-to: rgba(250, 177, 160, 0.1);
            --dot-glow: #e17055;
        }
        
        [data-theme="purple"] {
            --primary: #a29bfe;
            --primary-light: #dfe6e9;
            --bg: #f5f3ff;
            --bg-chat: #ffffff;
            --text: #2d3436;
            --text-soft: #636e72;
            --border: #d4d1ff;
            --user-bg: #6c5ce7;
            --user-text: #ffffff;
            --assistant-bg: #f0edff;
            --assistant-text: #2d3436;
            --header-gradient: linear-gradient(135deg, #a29bfe 0%, #6c5ce7 100%);
            --dot-gradient-from: rgba(162, 155, 254, 0.25);
            --dot-gradient-to: rgba(108, 92, 231, 0.15);
            --dot-glow: #a29bfe;
        }
        
        [data-theme="midnight"] {
            --primary: #2d3436;
            --primary-light: #636e72;
            --bg: #0c0c0c;
            --bg-chat: #1a1a1a;
            --text: #eaeaea;
            --text-soft: #808080;
            --border: #333333;
            --user-bg: #2d3436;
            --user-text: #ffffff;
            --assistant-bg: #1a1a1a;
            --assistant-text: #eaeaea;
            --header-gradient: linear-gradient(135deg, #434343 0%, #000000 100%);
            --dot-gradient-from: rgba(45, 52, 54, 0.3);
            --dot-gradient-to: rgba(0, 0, 0, 0.1);
            --dot-glow: #2d3436;
        }
        
        /* 字体大小设置 */
        [data-font-size="small"] { --font-size-base: 13px; }
        [data-font-size="medium"] { --font-size-base: 15px; }
        [data-font-size="large"] { --font-size-base: 17px; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            font-size: var(--font-size-base);
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* DotField 背景 */
        #dot-field {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }
        
        /* 登录页面 */
        .login-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .login-overlay.hidden { display: none; }
        
        .login-box {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 25px 70px rgba(0,0,0,0.25);
        }
        
        .login-box h1 {
            text-align: center;
            background: var(--header-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            font-size: 28px;
            font-weight: 700;
        }
        
        .login-box .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .login-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }
        
        .login-tab {
            flex: 1;
            padding: 12px;
            border: none;
            background: #f5f5f5;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #666;
            transition: all 0.3s;
        }
        
        .login-tab.active {
            background: var(--header-gradient);
            color: white;
        }
        
        .login-input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            margin-bottom: 15px;
            transition: border-color 0.3s;
            background: white;
        }
        
        .login-input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--header-gradient);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        
        .login-error {
            color: #e74c3c;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            display: none;
        }
        
        /* 主布局 */
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
            z-index: 5;
        }
        
        /* 侧边栏 - 会话列表 */
        .sidebar {
            width: 280px;
            background: var(--bg-chat);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s;
        }
        
        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .sidebar-header h3 {
            font-size: 16px;
            font-weight: 600;
        }
        
        .new-chat-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: none;
            background: var(--header-gradient);
            color: white;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .session-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        
        .session-item {
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.2s;
            margin-bottom: 4px;
        }
        
        .session-item:hover {
            background: var(--bg);
        }
        
        .session-item.active {
            background: rgba(102, 126, 234, 0.15);
        }
        
        .session-item .session-icon {
            font-size: 20px;
        }
        
        .session-item .session-info {
            flex: 1;
            overflow: hidden;
        }
        
        .session-item .session-title {
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .session-item .session-time {
            font-size: 11px;
            color: var(--text-soft);
        }
        
        .session-item .session-actions {
            display: none;
            gap: 4px;
        }
        
        .session-item:hover .session-actions {
            display: flex;
        }
        
        .session-action-btn {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.6;
        }
        
        .session-action-btn:hover {
            background: var(--border);
            opacity: 1;
        }
        
        /* 顶部导航 */
        .header {
            background: var(--bg-chat);
            border-bottom: 1px solid var(--border);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
            position: relative;
            z-index: 10;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .menu-btn {
            display: none;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            border: none;
            background: var(--bg);
            cursor: pointer;
            font-size: 20px;
        }
        
        .header-icon {
            font-size: 28px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--header-gradient);
            border-radius: 12px;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }
        
        .header-title h1 {
            font-size: 16px;
            font-weight: 600;
        }
        
        .header-title p {
            font-size: 11px;
            color: var(--text-soft);
        }
        
        .header-right {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        
        .header-btn {
            padding: 8px 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            color: var(--text);
        }
        
        .header-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        .header-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        .user-info-box {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            background: var(--bg);
            border-radius: 20px;
            font-size: 13px;
        }
        
        .logout-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            opacity: 0.7;
            transition: opacity 0.2s;
        }
        
        .logout-btn:hover { opacity: 1; }
        
        /* 聊天区域 */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: var(--bg);
        }
        
        .welcome {
            text-align: center;
            padding: 60px 20px;
        }
        
        .welcome-icon {
            font-size: 64px;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .welcome h2 {
            font-size: 22px;
            margin-bottom: 10px;
        }
        
        .welcome p {
            color: var(--text-soft);
            margin-bottom: 30px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .quick-btns {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        
        .quick-btn {
            padding: 10px 16px;
            background: var(--bg-chat);
            border: 1px solid var(--border);
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            color: var(--text);
        }
        
        .quick-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.25);
        }
        
        /* 消息样式 */
        .msg {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            animation: msgIn 0.3s ease;
        }
        
        @keyframes msgIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .msg.user { flex-direction: row-reverse; }
        
        .msg-avatar {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: var(--header-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.25);
        }
        
        .msg.user .msg-avatar {
            background: var(--primary);
        }
        
        .msg-body {
            max-width: 75%;
        }
        
        .msg-text {
            padding: 14px 18px;
            border-radius: var(--msg-bubble-radius);
            line-height: 1.6;
            font-size: var(--font-size-base);
            position: relative;
            word-wrap: break-word;
        }
        
        .msg.user .msg-text {
            background: var(--user-bg);
            color: var(--user-text);
            border-bottom-right-radius: 4px;
        }
        
        .msg.assistant .msg-text {
            background: var(--assistant-bg);
            color: var(--assistant-text);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }
        
        .msg-time {
            font-size: 11px;
            color: var(--text-soft);
            margin-top: 5px;
            padding: 0 4px;
        }
        
        .msg.user .msg-time { text-align: right; }
        
        .copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: transparent;
            border: none;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
            font-size: 14px;
        }
        
        .msg-text:hover .copy-btn { opacity: 0.5; }
        .copy-btn:hover { opacity: 1 !important; }
        .copy-btn.copied { color: #2ecc71; opacity: 1; }
        
        /* 表情包样式 */
        .msg-sticker {
            font-size: 64px;
            line-height: 1;
        }
        
        /* 快捷回复 */
        .quick-replies {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
            padding: 0 4px;
        }
        
        .quick-reply-btn {
            padding: 6px 14px;
            background: var(--bg-chat);
            border: 1px solid var(--border);
            border-radius: 18px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            color: var(--text);
        }
        
        .quick-reply-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        /* 打字动画 */
        .typing-box {
            display: flex;
            gap: 6px;
            padding: 8px 0;
        }
        
        .typing-box span {
            width: 10px;
            height: 10px;
            background: var(--primary-light);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        
        .typing-box span:nth-child(2) { animation-delay: 0.2s; }
        .typing-box span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
            30% { transform: translateY(-10px); opacity: 1; }
        }
        
        /* 底部输入区 */
        .input-area {
            background: var(--bg-chat);
            border-top: 1px solid var(--border);
            padding: 12px 16px;
            position: relative;
            z-index: 10;
        }
        
        .input-row {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }
        
        .input-actions {
            display: flex;
            gap: 4px;
        }
        
        #msgInput {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 14px;
            font-size: var(--font-size-base);
            resize: none;
            max-height: 120px;
            font-family: inherit;
            background: var(--bg);
            color: var(--text);
        }
        
        #msgInput:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .input-btn {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s;
        }
        
        .input-btn:hover { transform: scale(1.05); }
        .input-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        .img-btn, .emoji-btn, .voice-btn {
            background: var(--bg);
            color: var(--text-soft);
        }
        
        .voice-btn.recording {
            background: #e74c3c;
            color: white;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .send-btn {
            background: var(--header-gradient);
            color: white;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }
        
        /* 设置模态框 */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active { display: flex; }
        
        .modal-content {
            background: var(--bg-chat);
            border-radius: 20px;
            padding: 24px;
            width: 90%;
            max-width: 560px;
            max-height: 85vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-header h2 {
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-soft);
            line-height: 1;
        }
        
        .close-btn:hover { color: var(--text); }
        
        .admin-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .admin-tab {
            padding: 8px 16px;
            border: 1px solid var(--border);
            background: transparent;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            color: var(--text);
        }
        
        .admin-tab.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        .settings-tab { display: none; }
        .settings-tab.active { display: block; }
        
        /* 人设选择 */
        .personality-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .personality-card {
            padding: 14px;
            border: 2px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        
        .personality-card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }
        
        .personality-card.selected {
            border-color: var(--primary);
            background: rgba(102, 126, 234, 0.1);
        }
        
        .personality-card .emoji {
            font-size: 32px;
            margin-bottom: 6px;
        }
        
        .personality-card .name {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 2px;
        }
        
        .personality-card .desc {
            font-size: 10px;
            color: var(--text-soft);
        }
        
        /* 主题选择 */
        .theme-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }
        
        .theme-option {
            aspect-ratio: 1;
            border-radius: 10px;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.2s;
            position: relative;
        }
        
        .theme-option:hover { transform: scale(1.1); }
        
        .theme-option.selected {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px white, 0 0 0 4px var(--primary);
        }
        
        .theme-option::after {
            content: attr(data-name);
            position: absolute;
            bottom: -18px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 9px;
            color: var(--text-soft);
            white-space: nowrap;
        }
        
        .theme-default { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .theme-dark { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); }
        .theme-ocean { background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%); }
        .theme-forest { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
        .theme-sunset { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .theme-purple { background: linear-gradient(135deg, #a29bfe 0%, #6c5ce7 100%); }
        
        /* 设置选项 */
        .setting-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 0;
            border-bottom: 1px solid var(--border);
        }
        
        .setting-item:last-child { border-bottom: none; }
        
        .setting-label {
            font-size: 14px;
        }
        
        .setting-label small {
            display: block;
            font-size: 12px;
            color: var(--text-soft);
            margin-top: 2px;
        }
        
        .setting-control select,
        .setting-control input[type="range"] {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg);
            color: var(--text);
            font-size: 13px;
        }
        
        /* 语言选择器 */
        .lang-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .lang-option {
            padding: 14px;
            border: 2px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }
        
        .lang-option:hover {
            border-color: var(--primary);
        }
        
        .lang-option.selected {
            border-color: var(--primary);
            background: rgba(102, 126, 234, 0.1);
        }
        
        .lang-option .lang-flag {
            font-size: 28px;
            margin-bottom: 6px;
        }
        
        .lang-option .lang-name {
            font-size: 13px;
            font-weight: 500;
        }
        
        /* 表情选择器 */
        .emoji-picker {
            display: none;
            position: absolute;
            bottom: 70px;
            left: 16px;
            right: 16px;
            background: var(--bg-chat);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
            z-index: 50;
        }
        
        .emoji-picker.active { display: block; }
        
        .emoji-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
            overflow-x: auto;
            padding-bottom: 8px;
        }
        
        .emoji-tab {
            padding: 6px 12px;
            border: none;
            background: var(--bg);
            border-radius: 20px;
            cursor: pointer;
            font-size: 16px;
            white-space: nowrap;
            transition: all 0.2s;
        }
        
        .emoji-tab.active {
            background: var(--primary);
        }
        
        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 6px;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .emoji-item {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .emoji-item:hover {
            background: var(--bg);
            transform: scale(1.2);
        }
        
        /* 人设编辑器 */
        .personality-editor {
            padding: 16px 0;
        }
        
        .personality-editor .form-group {
            margin-bottom: 16px;
        }
        
        .personality-editor label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            font-size: 13px;
        }
        
        .personality-editor input,
        .personality-editor textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            background: var(--bg);
            color: var(--text);
        }
        
        .personality-editor textarea {
            min-height: 120px;
            resize: vertical;
            font-family: inherit;
        }
        
        /* 管理面板 */
        .admin-panel {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        
        .admin-panel.active { display: flex; }
        
        .admin-content {
            background: var(--bg-chat);
            border-radius: 20px;
            padding: 24px;
            width: 90%;
            max-width: 700px;
            max-height: 85vh;
            overflow-y: auto;
        }
        
        .user-list {
            display: grid;
            gap: 12px;
        }
        
        .user-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px;
            background: var(--bg);
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .user-avatar {
            font-size: 24px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--header-gradient);
            border-radius: 50%;
        }
        
        .user-details h4 {
            font-size: 14px;
            margin-bottom: 2px;
        }
        
        .user-details span {
            font-size: 12px;
            color: var(--text-soft);
        }
        
        .user-actions {
            display: flex;
            gap: 8px;
        }
        
        .user-actions button {
            padding: 6px 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        
        .btn-edit { background: var(--primary); color: white; }
        .btn-delete { background: #e74c3c; color: white; }
        
        .add-user-btn {
            width: 100%;
            padding: 14px;
            border: 2px dashed var(--border);
            border-radius: 12px;
            background: transparent;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-soft);
            transition: all 0.2s;
        }
        
        .add-user-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            font-size: 13px;
        }
        
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            background: var(--bg);
            color: var(--text);
        }
        
        .form-group textarea {
            min-height: 80px;
            resize: vertical;
            font-family: inherit;
        }
        
        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }
        
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: var(--header-gradient);
            color: white;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }
        
        .btn-secondary {
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
        }
        
        .btn:hover { transform: translateY(-1px); }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 14px;
            opacity: 0;
            transition: all 0.3s;
            z-index: 200;
        }
        
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        
        /* 图片查看器 */
        .image-viewer {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }
        
        .image-viewer.active { display: flex; }
        
        .image-viewer img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 12px;
        }
        
        .msg-img {
            max-width: 180px;
            max-height: 180px;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 8px;
        }
        
        .msg-img:hover { transform: scale(1.05); }
        
        /* 快捷回复管理 */
        .quick-reply-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        
        .quick-reply-tag {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            font-size: 13px;
        }
        
        .quick-reply-tag .remove {
            cursor: pointer;
            opacity: 0.5;
        }
        
        .quick-reply-tag .remove:hover { opacity: 1; }
        
        .add-quick-reply {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        
        .add-quick-reply input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 13px;
            background: var(--bg);
            color: var(--text);
        }
        
        .add-quick-reply button {
            padding: 8px 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
        }
        
        /* 代码块样式 */
        .msg-text pre {
            background: #1e1e1e;
            border-radius: 8px;
            padding: 12px;
            margin: 10px 0;
            overflow-x: auto;
        }
        
        .msg-text code {
            font-family: 'Fira Code', monospace;
            font-size: 13px;
        }
        
        .msg-text pre code { color: #d4d4d4; }
        
        .msg-text code:not(pre code) {
            background: rgba(0,0,0,0.1);
            padding: 2px 6px;
            border-radius: 4px;
        }
        
        .msg-text blockquote {
            border-left: 3px solid var(--primary);
            padding-left: 12px;
            margin: 10px 0;
            color: var(--text-soft);
        }
        
        .msg-text a { color: var(--primary); }
        
        .msg-text ul, .msg-text ol {
            margin: 10px 0;
            padding-left: 20px;
        }
        
        /* ==================== 响应式设计 ==================== */
        @media (max-width: 768px) {
            .menu-btn { display: flex; }
            
            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                bottom: 0;
                z-index: 50;
                transform: translateX(-100%);
                width: 300px;
            }
            
            .sidebar.open {
                transform: translateX(0);
            }
            
            .sidebar-overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.5);
                z-index: 49;
            }
            
            .sidebar-overlay.active { display: block; }
            
            .header-title h1 { font-size: 14px; }
            .header-title p { display: none; }
            
            .header-btn span { display: none; }
            .header-btn { padding: 8px; font-size: 16px; }
            
            .user-info-box span:not(#currentUsername) { display: none; }
            
            .msg-body { max-width: 85%; }
            
            .welcome { padding: 40px 16px; }
            .welcome-icon { font-size: 48px; }
            .welcome h2 { font-size: 18px; }
            
            .quick-btns {
                overflow-x: auto;
                flex-wrap: nowrap;
                justify-content: flex-start;
                padding-bottom: 8px;
                -webkit-overflow-scrolling: touch;
            }
            
            .quick-btn {
                flex-shrink: 0;
                padding: 8px 14px;
                font-size: 13px;
            }
            
            .input-row { gap: 6px; }
            .input-btn { width: 40px; height: 40px; font-size: 16px; }
            
            .modal-content {
                padding: 20px;
                max-height: 90vh;
            }
            
            .personality-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .theme-grid {
                grid-template-columns: repeat(3, 1fr);
            }
            
            .emoji-grid {
                grid-template-columns: repeat(6, 1fr);
            }
        }
        
        @media (max-width: 480px) {
            .login-box { padding: 30px 20px; }
            .login-box h1 { font-size: 24px; }
            
            .header { padding: 10px 12px; }
            .header-icon { width: 36px; height: 36px; font-size: 20px; }
            
            .chat-container { padding: 12px; }
            
            .msg { margin-bottom: 16px; }
            .msg-avatar { width: 32px; height: 32px; font-size: 18px; }
            .msg-text { padding: 10px 14px; font-size: 14px; }
            
            .input-area { padding: 10px 12px; }
            
            .msg-img { max-width: 140px; max-height: 140px; }
        }
    </style>
</head>
<body>
    <!-- DotField 背景画布 -->
    <canvas id="dot-field"></canvas>
    
    <!-- 登录页面 -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <h1>知心伙伴</h1>
            <p class="subtitle">选择你的 AI 伙伴，开始温暖对话</p>
            <div class="login-tabs">
                <button class="login-tab active" onclick="switchLoginTab('login')" data-i18n="login">登录</button>
                <button class="login-tab" onclick="switchLoginTab('register')" data-i18n="register">注册</button>
            </div>
            <div id="loginForm">
                <input type="text" class="login-input" id="loginUsername" placeholder="用户名" autocomplete="username">
                <input type="password" class="login-input" id="loginPassword" placeholder="密码" autocomplete="current-password">
                <button class="login-btn" onclick="login()">登录</button>
            </div>
            <div id="registerForm" style="display:none;">
                <input type="text" class="login-input" id="regUsername" placeholder="设置用户名" autocomplete="username">
                <input type="password" class="login-input" id="regPassword" placeholder="设置密码" autocomplete="new-password">
                <input type="password" class="login-input" id="regPassword2" placeholder="确认密码" autocomplete="new-password">
                <button class="login-btn" onclick="register()">注册</button>
            </div>
            <div class="login-error" id="loginError">用户名或密码错误</div>
        </div>
    </div>
    
    <!-- 侧边栏遮罩 -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
    
    <!-- 主布局 -->
    <div class="main-layout">
        <!-- 侧边栏 - 会话列表 -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3 data-i18n="sessions">会话</h3>
                <button class="new-chat-btn" onclick="createNewSession()" title="新建会话">+</button>
            </div>
            <div class="session-list" id="sessionList"></div>
        </div>
        
        <!-- 聊天区域 -->
        <div class="chat-area">
            <!-- 顶部导航 -->
            <div class="header">
                <div class="header-left">
                    <button class="menu-btn" onclick="toggleSidebar()">☰</button>
                    <div class="header-icon" id="headerIcon">🌸</div>
                    <div class="header-title">
                        <h1 id="headerName">知心伙伴</h1>
                        <p id="headerDesc">你的温暖好友</p>
                    </div>
                </div>
                <div class="header-right">
                    <div class="user-info-box" id="userInfo">
                        <span id="userAvatar">👤</span>
                        <span id="currentUsername">admin</span>
                        <button class="logout-btn" onclick="logout()" title="退出">🚪</button>
                    </div>
                    <button class="header-btn" onclick="toggleTheme()" id="themeBtn" title="主题">🎨</button>
                    <button class="header-btn" onclick="openPersonalitySelect()" title="人设">👤</button>
                    <button class="header-btn" onclick="openSettings()">⚙️</button>
                    <button class="header-btn" id="adminBtn" onclick="openAdminPanel()" style="display:none;">🔧</button>
                </div>
            </div>
            
            <!-- 聊天容器 -->
            <div class="chat-container" id="chatMsgs">
                <div class="welcome">
                    <div class="welcome-icon" id="welcomeIcon">🌸</div>
                    <h2>你好呀！我是 <span class="cfg-name" id="welcomeName">知心伙伴</span></h2>
                    <p id="welcomeDesc">很高兴能陪伴你！可以选择不同的人设，开启不一样的对话体验~</p>
                    <div class="quick-btns" id="welcomeQuickBtns"></div>
                </div>
            </div>
            
            <!-- 表情选择器 -->
            <div class="emoji-picker" id="emojiPicker">
                <div class="emoji-tabs" id="emojiTabs"></div>
                <div class="emoji-grid" id="emojiGrid"></div>
            </div>
            
            <!-- 底部输入区 -->
            <div class="input-area">
                <div class="input-row">
                    <input type="file" id="imgInput" accept="image/jpeg,image/jpg" style="display:none" onchange="handleImg(this)">
                    <div class="input-actions">
                        <button class="input-btn emoji-btn" onclick="toggleEmojiPicker()" title="表情">😊</button>
                        <button class="input-btn voice-btn" id="voiceBtn" onclick="toggleVoice()" title="语音">🎤</button>
                        <button class="input-btn img-btn" onclick="document.getElementById('imgInput').click()" title="图片">📷</button>
                    </div>
                    <textarea id="msgInput" placeholder="输入消息..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
                    <button class="input-btn send-btn" id="sendBtn" onclick="sendMsg()" title="发送">➤</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 设置模态框 -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>⚙️ 设置</h2>
                <button class="close-btn" onclick="closeSettings()">&times;</button>
            </div>
            <div class="admin-tabs">
                <button class="admin-tab active" onclick="switchSettingsTab('personality')">人设</button>
                <button class="admin-tab" onclick="switchSettingsTab('theme')">主题</button>
                <button class="admin-tab" onclick="switchSettingsTab('appearance')">外观</button>
                <button class="admin-tab" onclick="switchSettingsTab('language')">语言</button>
                <button class="admin-tab" onclick="switchSettingsTab('quickreply')">快捷回复</button>
            </div>
            
            <!-- 人设选择 -->
            <div id="personalityTab" class="settings-tab active">
                <div class="personality-grid" id="personalityGrid"></div>
            </div>
            
            <!-- 主题选择 -->
            <div id="themeTab" class="settings-tab">
                <div class="theme-grid">
                    <div class="theme-option theme-default selected" data-theme="" data-name="默认" onclick="selectTheme('')"></div>
                    <div class="theme-option theme-dark" data-theme="dark" data-name="深色" onclick="selectTheme('dark')"></div>
                    <div class="theme-option theme-ocean" data-theme="ocean" data-name="海洋" onclick="selectTheme('ocean')"></div>
                    <div class="theme-option theme-forest" data-theme="forest" data-name="森林" onclick="selectTheme('forest')"></div>
                    <div class="theme-option theme-sunset" data-theme="sunset" data-name="日落" onclick="selectTheme('sunset')"></div>
                    <div class="theme-option theme-purple" data-theme="purple" data-name="梦幻" onclick="selectTheme('purple')"></div>
                </div>
            </div>
            
            <!-- 外观设置 -->
            <div id="appearanceTab" class="settings-tab">
                <div class="setting-item">
                    <div class="setting-label">
                        字体大小
                        <small>调整聊天消息的字体大小</small>
                    </div>
                    <div class="setting-control">
                        <select id="fontSizeSelect" onchange="setFontSize(this.value)">
                            <option value="small">小</option>
                            <option value="medium" selected>中</option>
                            <option value="large">大</option>
                        </select>
                    </div>
                </div>
                <div class="setting-item">
                    <div class="setting-label">
                        自动滚动
                        <small>新消息时自动滚动到底部</small>
                    </div>
                    <div class="setting-control">
                        <select id="autoScrollSelect" onchange="setAutoScroll(this.value === 'true')">
                            <option value="true" selected>开启</option>
                            <option value="false">关闭</option>
                        </select>
                    </div>
                </div>
                <div class="setting-item">
                    <div class="setting-label">
                        语音播报
                        <small>AI回复时自动朗读</small>
                    </div>
                    <div class="setting-control">
                        <select id="voiceSpeakSelect" onchange="setVoiceSpeak(this.value === 'true')">
                            <option value="true">开启</option>
                            <option value="false" selected>关闭</option>
                        </select>
                    </div>
                </div>
            </div>
            
            <!-- 语言设置 -->
            <div id="languageTab" class="settings-tab">
                <div class="lang-grid">
                    <div class="lang-option selected" data-lang="zh" onclick="setLanguage('zh')">
                        <div class="lang-flag">🇨🇳</div>
                        <div class="lang-name">中文</div>
                    </div>
                    <div class="lang-option" data-lang="en" onclick="setLanguage('en')">
                        <div class="lang-flag">🇺🇸</div>
                        <div class="lang-name">English</div>
                    </div>
                    <div class="lang-option" data-lang="ja" onclick="setLanguage('ja')">
                        <div class="lang-flag">🇯🇵</div>
                        <div class="lang-name">日本語</div>
                    </div>
                </div>

        // ==================== DotField 背景动画 (性能优化版) ====================
        const TWO_PI = Math.PI * 2;
        let dotField = null;
        let animationId = null;
        
        function initDotField() {
            const canvas = document.getElementById('dot-field');
            const ctx = canvas.getContext('2d', { alpha: true });
            const dpr = Math.min(window.devicePixelRatio || 1, 2);
            let resizeTimer;
            
            function resize() {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(doResize, 100);
            }
            
            function doResize() {
                const w = window.innerWidth;
                const h = window.innerHeight;
                canvas.width = w * dpr;
                canvas.height = h * dpr;
                canvas.style.width = `${w}px`;
                canvas.style.height = `${h}px`;
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                buildDots(w, h);
            }
            
            let dots = [];
            const dotRadius = 1.5;
            const dotSpacing = 20;
            
            function buildDots(w, h) {
                const step = dotRadius + dotSpacing;
                const cols = Math.floor(w / step);
                const rows = Math.floor(h / step);
                const padX = (w % step) / 2;
                const padY = (h % step) / 2;
                dots = [];
                for (let row = 0; row < rows; row++) {
                    for (let col = 0; col < cols; col++) {
                        const ax = padX + col * step + step / 2;
                        const ay = padY + row * step + step / 2;
                        dots.push({ ax, ay, sx: ax, sy: ay });
                    }
                }
            }
            
            const mouse = { x: -9999, y: -9999 };
            document.addEventListener('mousemove', (e) => {
                mouse.x = e.pageX;
                mouse.y = e.pageY;
            }, { passive: true });
            
            let frameCount = 0;
            let lastFrameTime = 0;
            const targetFPS = 30;
            const frameInterval = 1000 / targetFPS;
            
            function tick(timestamp) {
                animationId = requestAnimationFrame(tick);
                
                const elapsed = timestamp - lastFrameTime;
                if (elapsed < frameInterval) return;
                lastFrameTime = timestamp - (elapsed % frameInterval);
                
                frameCount++;
                const w = canvas.width / dpr;
                const h = canvas.height / dpr;
                
                ctx.clearRect(0, 0, w, h);
                
                const style = getComputedStyle(document.documentElement);
                const gradientFrom = style.getPropertyValue('--dot-gradient-from').trim() || 'rgba(108, 92, 231, 0.15)';
                const gradientTo = style.getPropertyValue('--dot-gradient-to').trim() || 'rgba(255, 255, 255, 0.1)';
                
                const grad = ctx.createLinearGradient(0, 0, w, h);
                grad.addColorStop(0, gradientFrom);
                grad.addColorStop(1, gradientTo);
                ctx.fillStyle = grad;
                
                const cr = 100;
                const crSq = cr * cr;
                
                ctx.beginPath();
                for (let i = 0; i < dots.length; i++) {
                    const d = dots[i];
                    const dx = mouse.x - d.ax;
                    const dy = mouse.y - d.ay;
                    const distSq = dx * dx + dy * dy;
                    
                    if (distSq < crSq) {
                        const dist = Math.sqrt(distSq);
                        const push = (1 - dist / cr) * (1 - dist / cr) * 30;
                        const angle = Math.atan2(dy, dx);
                        d.sx += (d.ax - Math.cos(angle) * push - d.sx) * 0.12;
                        d.sy += (d.ay - Math.sin(angle) * push - d.sy) * 0.12;
                    } else {
                        d.sx += (d.ax - d.sx) * 0.08;
                        d.sy += (d.ay - d.sy) * 0.08;
                    }
                    
                    ctx.moveTo(d.sx + dotRadius, d.sy);
                    ctx.arc(d.sx, d.sy, dotRadius, 0, TWO_PI);
                }
                ctx.fill();
            }
            
            doResize();
            window.addEventListener('resize', resize);
            animationId = requestAnimationFrame(tick);
            dotField = { resize: doResize };
        }

                createdAt: Date.now()

            sessionId = newSession.id;
            saveSessions();
            renderSessionList();
            clearChatUI();
            closeSidebar();

        function switchSession(index) {
            if (currentSessionIndex === index) {
                closeSidebar();
                return;

            currentSessionIndex = index;
            sessionId = sessions[index].id;
            selectedPersonality = sessions[index].personality || 'xiaonuan';
            localStorage.setItem('personality', selectedPersonality);
            
            loadChatHistory();
            loadPersonalities();
            applyPersonality(selectedPersonality);
            renderSessionList();
            closeSidebar();
        }
        
        function deleteSession(index) {
            if (!confirm(t('confirmDelete'))) return;
            
            sessions.splice(index, 1);
            if (currentSessionIndex >= index && currentSessionIndex > 0) {
                currentSessionIndex--;
            }
            
            if (sessions.length === 0) {
                createNewSession();
            } else if (currentSessionIndex >= sessions.length) {
                currentSessionIndex = sessions.length - 1;
            }
            
            sessionId = sessions[currentSessionIndex]?.id;
            saveSessions();
            renderSessionList();
            loadChatHistory();
        }

        function formatTime(ts) {
            const d = new Date(ts);
            const now = new Date();
            const diff = now - d;
            
            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
            if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
            return d.toLocaleDateString();
        }

                    const data = await r.json();
                    currentUser = data;
                    userRole = data.role || 'user';
                    document.getElementById('loginOverlay').classList.add('hidden');
                    document.getElementById('currentUsername').textContent = data.username;
                    document.getElementById('userAvatar').textContent = data.avatar || '👤';
                    if (data.role === 'admin') {
                        document.getElementById('adminBtn').style.display = 'block';
                    }
                    loadSessions();
                    if (sessions.length === 0) {
                        createNewSession();
                    } else {
                        sessionId = sessions[currentSessionIndex]?.id;
                    }
                    await loadPersonalities();
                    applyPersonality(selectedPersonality);
                    initEmojiPicker();
                    applyLanguage();
                } else {
                    authToken = null;
                    localStorage.removeItem('auth_token');
                    document.getElementById('loginOverlay').classList.remove('hidden');

                authToken = null;
                localStorage.removeItem('auth_token');
                document.getElementById('loginOverlay').classList.remove('hidden');

        }
        
        async function login() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            if (!username || !password) {
                document.getElementById('loginError').textContent = '请输入用户名和密码';
                document.getElementById('loginError').style.display = 'block';
                return;
            }
            
            // 显示加载状态
            const loginBtn = document.querySelector('.login-btn');
            const originalText = loginBtn.textContent;
            loginBtn.textContent = '登录中...';
            loginBtn.disabled = true;
            
            try {
                const r = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await r.json();
                
                if (r.ok) {
                    authToken = data.token;
                    localStorage.setItem('auth_token', data.token);
                    currentUser = data;
                    userRole = data.role || 'user';
                    document.getElementById('loginOverlay').classList.add('hidden');
                    document.getElementById('currentUsername').textContent = data.username;
                    document.getElementById('userAvatar').textContent = data.avatar || '👤';
                    if (data.role === 'admin') {
                        document.getElementById('adminBtn').style.display = 'block';
                    }
                    loadSessions();
                    if (sessions.length === 0) {
                        createNewSession();
                    }
                    await loadPersonalities();
                    applyPersonality(selectedPersonality);
                    toast(t('loginSuccess'));
                } else {
                    document.getElementById('loginError').textContent = data.detail || '登录失败，请检查用户名和密码';
                    document.getElementById('loginError').style.display = 'block';
                }
            } catch (e) {
                console.error('登录错误:', e);
                document.getElementById('loginError').textContent = '无法连接到服务器，请确保服务器已启动';
                document.getElementById('loginError').style.display = 'block';
            } finally {
                loginBtn.textContent = originalText;
                loginBtn.disabled = false;
            }
        }
        
        async function register() {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const password2 = document.getElementById('regPassword2').value;
            
            if (!username || !password) {
                document.getElementById('loginError').textContent = '请填写所有字段';
                document.getElementById('loginError').style.display = 'block';
                return;
            }
            
            if (password !== password2) {
                document.getElementById('loginError').textContent = '两次密码不一致';
                document.getElementById('loginError').style.display = 'block';
                return;
            }
            
            try {
                const r = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })

        function mergePersonalities() {
            // 将自定义人设合并到人设列表
            const customItems = customPersonalities.map(p => ({
                id: p.id,

                emoji: p.emoji,
                description: p.description,
                system_prompt: p.system_prompt,
                gradient: p.gradient
            }));

            // 保持原有人设 + 添加自定义人设
            const basePersonalityIds = ['xiaonuan', 'yixiaofu', 'xiaoye', 'qiaobiluo', 'tielian', 'xiaoyao', 'yiyiyaya', 'xiaowanzi'];
            const filtered = personalities.filter(p => !basePersonalityIds.includes(p.id) || customPersonalities.some(cp => cp.id === p.id));

            // 添加不在列表中的自定义人设
            customItems.forEach(cp => {
                if (!filtered.some(p => p.id === cp.id)) {
                    filtered.push(cp);
                }
            });

            // 如果有重复，替换
            customItems.forEach(cp => {
                const idx = filtered.findIndex(p => p.id === cp.id);
                if (idx >= 0) {
                    filtered[idx] = cp;
                }
            });
        }

        function toggleVoice() {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                toast(t('speakError'));
                return;
            }
            
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        }
        
        function startRecording() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = currentLang === 'ja' ? 'ja-JP' : (currentLang === 'en' ? 'en-US' : 'zh-CN');
            recognition.continuous = false;
            recognition.interimResults = true;
            
            recognition.onstart = () => {
                isRecording = true;
                document.getElementById('voiceBtn').classList.add('recording');
                document.getElementById('voiceBtn').textContent = '⏹️';
            };
            
            recognition.onresult = (event) => {
                const transcript = Array.from(event.results)
                    .map(result => result[0].transcript)
                    .join('');
                document.getElementById('msgInput').value = transcript;
            };
            
            recognition.onend = () => {
                stopRecording();
            };
            
            recognition.onerror = (event) => {
                console.error('Speech recognition error:', event.error);
                stopRecording();
            };
            
            recognition.start();
        }
        
        function stopRecording() {
            if (recognition) {
                recognition.stop();
                recognition = null;
            }
            isRecording = false;
            document.getElementById('voiceBtn').classList.remove('recording');
            document.getElementById('voiceBtn').textContent = '🎤';
        }
        
        function speakText(text) {
            if (!voiceSpeak || !('speechSynthesis' in window)) return;
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = currentLang === 'ja' ? 'ja-JP' : (currentLang === 'en' ? 'en-US' : 'zh-CN');
            utterance.rate = 1.0;
            utterance.pitch = 1.0;
            
            speechSynthesis.cancel();
            speechSynthesis.speak(utterance);
        }

        function formatContent(text) {
            if (!text) return '';
            
            text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (match, lang, code) => {
                return `<pre><code class="language-${lang}">${escapeHtml(code.trim())}</code></pre>`;
            });
            
            text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
            text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            text = text.replace(/\*(.*?)\*/g, '<em>$1</em>');
            text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
            text = text.replace(/^>\s*(.*)$/gm, '<blockquote>$1</blockquote>');
            text = text.replace(/^[\-\*]\s+(.*)$/gm, '<li>$1</li>');
            text = text.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');
            text = text.replace(/\n/g, '<br>');
            
            return text;
        }

        }
        
        function scrollToBottom() {
            if (autoScroll) {
                const container = document.getElementById('chatMsgs');
                setTimeout(() => {
                    container.scrollTop = container.scrollHeight;
                }, 100);
            }
        }
        
        function addQuickRepliesToMsg(msgText) {
            if (!quickReplies || quickReplies.length === 0) return '';
            return `
                <div class="quick-replies">
                    ${quickReplies.map(q => 
                        `<button class="quick-reply-btn" onclick="quickSend('${q.text}')">${q.emoji || '💬'} ${q.text}</button>`
                    ).join('')}
                </div>
            `;
        }
        
        function addMsg(role, text, imgUrl = null) {
            addMsgToUI(role, text, imgUrl);
            saveCurrentMessage(role, text, imgUrl);
        }
        
        function addMsgToUI(role, text, imgUrl = null) {
            const msgs = document.getElementById('chatMsgs');
            msgs.querySelector('.welcome')?.remove();
            
            const plainText = text;
            const formattedText = formatContent(text);
            const quickRepliesHtml = role === 'assistant' ? addQuickRepliesToMsg(text) : '';
            
            const div = document.createElement('div');
            div.className = `msg ${role}`;
            div.innerHTML = `
                <div class="msg-avatar">${role === 'user' ? (currentUser?.avatar || '👤') : (document.getElementById('headerIcon').textContent)}</div>
                <div class="msg-body">
                    <div class="msg-text">
                        ${formattedText}
                        ${imgUrl ? `<img class="msg-img" src="${imgUrl}" onclick="openViewer('${imgUrl}')" alt="图片">` : ''}
                        <button class="copy-btn" onclick="copyMsg(this, ${JSON.stringify(plainText).replace(/"/g, '"')})">📋</button>
                    </div>
                    ${quickRepliesHtml}
                    <div class="msg-time">${new Date().toLocaleTimeString(currentLang === 'zh' ? 'zh-CN' : (currentLang === 'ja' ? 'ja-JP' : 'en-US'), { hour: '2-digit', minute: '2-digit' })}</div>
                </div>
            `;
            msgs.appendChild(div);
            scrollToBottom();
        }
        
        function showTyping(show) {
            const msgs = document.getElementById('chatMsgs');
            let t = document.getElementById('typing');
            if (show && !t) {
                t = document.createElement('div');
                t.id = 'typing';
                t.className = 'msg assistant';
                t.innerHTML = `
                    <div class="msg-avatar">${document.getElementById('headerIcon').textContent}</div>
                    <div class="msg-body">
                        <div class="msg-text">
                            <div class="typing-box"><span></span><span></span><span></span></div>
                        </div>
                    </div>
                `;
                msgs.appendChild(t);
            } else if (!show && t) {
                t.remove();
            }
            scrollToBottom();
        }
        
        async function sendMsg() {
            if (busy) return;
            const input = document.getElementById('msgInput');
            const msg = input.value.trim();
            if (!msg && !imgData) return;
            
            busy = true;
            document.getElementById('sendBtn').disabled = true;
            
            let imgUrl = null;
            if (imgData) {
                imgUrl = `data:image/jpeg;base64,${imgData}`;
            }
            
            addMsg('user', msg || '[发送了一张图片]', imgUrl);
            showTyping(true);
            input.value = '';
            autoResize(input);
            
            try {
                const ctrl = new AbortController();
                const tid = setTimeout(() => ctrl.abort(), 120000);
                
                let endpoint = '/api/chat';
                let body = { message: msg, session_id: sessionId, personality_id: selectedPersonality };
                
                if (imgData) {
                    endpoint = '/api/image_chat';
                    body = { image: imgData, message: msg || '请描述这张图片里的内容', session_id: sessionId, personality_id: selectedPersonality };
                }
                
                const headers = { 'Content-Type': 'application/json' };
                if (authToken) headers['X-Auth-Token'] = authToken;
                
                const r = await fetch(endpoint, {
                    method: 'POST',
                    headers,
                    body: JSON.stringify(body),
                    signal: ctrl.signal
                });
                clearTimeout(tid);
                
                if (!r.ok) throw new Error();
                
                const data = await r.json();
                sessionId = data.session_id;
                showTyping(false);
                addMsg('assistant', data.response);
                
                if (voiceSpeak) {
                    speakText(data.response);
                }
                
            } catch (e) {
                showTyping(false);
                addMsg('assistant', '抱歉，遇到了点问题，请稍后重试~');
            }
            
            imgData = null;
            busy = false;
            document.getElementById('sendBtn').disabled = false;
            input.focus();
        }
        
        function toast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }
        
        // ==================== 初始化 ====================
        document.getElementById('loginPassword').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') login();
        });
        
        document.getElementById('settingsModal').addEventListener('click', (e) => {
            if (e.target.id === 'settingsModal') closeSettings();
        });
        
        document.getElementById('personalityModal').addEventListener('click', (e) => {
            if (e.target.id === 'personalityModal') closePersonalitySelect();
        });
        
        document.getElementById('adminPanel').addEventListener('click', (e) => {
            if (e.target.id === 'adminPanel') closeAdminPanel();
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeSettings();
                closePersonalitySelect();
                closeAdminPanel();
                closeViewer();
                closeSidebar();
            }
        });
        
        // 恢复设置
        if (currentTheme) {
            document.documentElement.setAttribute('data-theme', currentTheme);
        }
        
        const savedFontSize = localStorage.getItem('fontSize');
        if (savedFontSize) {
            document.documentElement.setAttribute('data-font-size', savedFontSize);
            document.getElementById('fontSizeSelect').value = savedFontSize;
        }
        
        autoScroll = localStorage.getItem('autoScroll') !== 'false';
        document.getElementById('autoScrollSelect').value = autoScroll;
        
        voiceSpeak = localStorage.getItem('voiceSpeak') === 'true';
        document.getElementById('voiceSpeakSelect').value = voiceSpeak;
        
        // 初始化
        initDotField();
        loadPersonalities();
        checkLogin();
    </script>
</body>
</html>
